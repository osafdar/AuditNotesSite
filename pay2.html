<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy AuditNotes Product - Overlay Checkout</title>
    <script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>
    <script>
        // --- PADDLE CONFIGURATION ---
        const PADDLE_CLIENT_TOKEN = 'live_47385f4474288fce66292c62abc';
        const PADDLE_PRICE_ID = 'pri_01kjvp2yv3epb2eg1p2a06radk';
        const SUCCESS_REDIRECT_URL = 'payment-complete.html';
        // ----------------------------

        // Paddle defaults to production. Use Paddle.Environment.set('sandbox') ONLY for testing.
        
        Paddle.Initialize({
            token: PADDLE_CLIENT_TOKEN,
            eventCallback: function(data) {
                if (data.name == "checkout.completed") {
                    window.location.href = SUCCESS_REDIRECT_URL;
                }
            }
        });

        function getQueryParams() {
            const params = {};
            const search = window.location.search.substring(1);
            if (!search) return params;
            search.split('&').forEach(function(part) {
                const [key, value] = part.split('=');
                params[decodeURIComponent(key)] = decodeURIComponent(value || '');
            });
            return params;
        }

        function openCheckout() {
            const params = getQueryParams();
            
            // Build the customer object if email is supplied.
            // This pre-fills and locks the email field in the checkout.
            const customerObj = params.email ? { email: params.email } : undefined;

            Paddle.Checkout.open({
                settings: {
                    displayMode: 'overlay',
                    allowLogout: false // Prevents the user from changing the pre-filled email
                },
                items: [
                    {
                        priceId: PADDLE_PRICE_ID,
                        quantity: 1
                    }
                ],
                customer: customerObj,
                customData: params
            });
        }

        window.onload = function() {
            const params = getQueryParams();
            const btn = document.getElementById('subscribe-btn');
            
            // Check if UID (or UserID) and email are provided in the URL query string
            if ((!params.UID && !params.UserID) || !params.email) {
                console.warn('Missing parameters: UID and/or email are required.');
                if (btn) {
                    btn.disabled = true;
                    btn.style.backgroundColor = '#666';
                    btn.style.cursor = 'not-allowed';
                }
            }
        };
    </script>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 0;
            background-image: url('images/hero.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ffffff;
        }
        
        .content-box {
            background-color: rgba(0, 0, 0, 0.7);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            max-width: 500px;
        }

        h1 { margin-top: 0; }

        button { font-size: 1.2em; padding: 15px 40px; background: #291c75; color: #fff; border: none; border-radius: 5px; cursor: pointer; margin-top: 15px; }
        button:hover { background: #011221; }
    </style>
</head>
<body>
    <div class="content-box">
        <p><b>truAudits for Auditors</b> - Annual Subscription Plan</p>
        <button id="subscribe-btn" onclick="openCheckout()">Subscribe (Popup Checkout)</button>
        <p style="margin-top:20px; font-size:0.9em;"><a href="mailto:success@trurigel.com" style="color: #cfcfcf; text-decoration: none;">Contact Support</a></p>
    </div>
</body>
</html>
