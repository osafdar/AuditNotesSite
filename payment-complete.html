<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Complete</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 0;
            background-image: url('images/hero.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ffffff;
        }

        .content-box {
            background-color: rgba(0, 0, 0, 0.7);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            max-width: 500px;
        }

        .success { color: #2ecc71; font-size: 2em; margin-bottom: 20px; font-weight: bold; }
        .info { color: #e0e0e0; font-size: 1.1em; line-height: 1.5; }
        .warning { color: #ffca28; font-weight: bold; } /* Brighter orange/yellow for dark background */

        button { font-size: 1.2em; padding: 15px 40px; background: #291c75; color: #fff; border: none; border-radius: 5px; cursor: pointer; margin-top: 25px; }
        button:hover { background: #011221; }
    </style>
</head>
<body>
    <div class="content-box">
        <div class="success">Thank you & Happy Auditing!!</div>

        <span class="info">You can close the browser now</span>
 
    </div>
    </div>
</body>
</html>
