<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Complete</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 100px; }
        .success { color: #27ae60; font-size: 2em; margin-bottom: 20px; }
        .info { color: #555; font-size: 1.1em; }
        button { margin-top: 40px; font-size: 1em; padding: 10px 30px; background: #1a82e2; color: #fff; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #155fa0; }
    </style>
</head>
<body>
    <div class="success">Thank you for your purchase!</div>
    <div class="info">Your payment was successful.<br>
    You may now close this page.<br><br>
    <span style="color:#b77c00;">Please allow up to 8 hours for payment changes to reflect on your account.</span>
    </div>
    <button onclick="window.close()">Close Page</button>
</body>
</html>
