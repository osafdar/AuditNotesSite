<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy AuditNotes Product</title>
    <script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>
    <script>
        // --- PADDLE CONFIGURATION ---
        const PADDLE_CLIENT_TOKEN = 'test_cb8f30e148f639113884b0805a0';
        const PADDLE_PRICE_ID = 'pri_01kk79s13ket4hae192qxtzkd2';
        const SUCCESS_REDIRECT_URL = 'payment-complete.html';
        // ----------------------------

        // Set the environment to sandbox before setup
        Paddle.Environment.set('sandbox');

        // Initialize Paddle with your Client Token
        Paddle.Initialize({
            token: PADDLE_CLIENT_TOKEN,
            eventCallback: function(data) {
                // If a checkout completes successfully, execute the redirect
                if (data.name == "checkout.completed") {
                    window.location.href = SUCCESS_REDIRECT_URL;
                }
            }
        });

        // Helper to get query params as object
        function getQueryParams() {
            const params = {};
            const search = window.location.search.substring(1);
            if (!search) return params;
            search.split('&').forEach(function(part) {
                const [key, value] = part.split('=');
                params[decodeURIComponent(key)] = decodeURIComponent(value || '');
            });
            return params;
        }

        function openCheckout() {
            const params = getQueryParams();
            // You can add more custom customData here if needed
            Paddle.Checkout.open({
                items: [
                    {
                        priceId: PADDLE_PRICE_ID,
                        quantity: 1
                    }
                ],
                customData: params
            });
        }
    </script>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 0;
            background-image: url('images/hero.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ffffff; /* Make text white to contrast with most background images */
        }
        
        .content-box {
            background-color: rgba(0, 0, 0, 0.7); /* Semi-transparent dark background for text readability */
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            max-width: 500px;
        }

        h1 { margin-top: 0; }

        button { font-size: 1.2em; padding: 15px 40px; background: #1a82e2; color: #fff; border: none; border-radius: 5px; cursor: pointer; margin-top: 15px; }
        button:hover { background: #155fa0; }
    </style>
</head>
<body>
    <div class="content-box">
        <h1>Buy AuditNotes Product</h1>
        <p>Click the button below to purchase:</p>
        <button onclick="openCheckout()">Buy Now</button>
        <p style="margin-top:30px;font-size:0.9em;color:#cfcfcf;">Powered by Paddle</p>
    </div>
</body>
</html>
